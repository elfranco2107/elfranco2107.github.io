            if (esPrimerRender) {
                offsetX = cssWidth / 2 - 120;
                offsetY = cssHeight / 2 + 150;
                esPrimerRender = false;
            }
        }
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => { resizeCanvas(); redibujarEscena(); }, 60);
        });
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const r = canvas.getBoundingClientRect();
            const mX = e.clientX - r.left, mY = e.clientY - r.top;
            const wX = (mX - offsetX) / scale, wY = (offsetY - mY) / scale;
            const delta = e.deltaY < 0 ? 1.1 : 1 / 1.1;
            const ns = Math.min(50, Math.max(0.1, scale * delta));
            offsetX = mX - wX * ns;
            offsetY = mY + wY * ns;
            scale = ns;
            redibujarEscena();
        });
        canvas.addEventListener('mousedown', (e) => {
            if (e.target === canvas) {
                isDragging = true;
                startX = e.clientX - offsetX;
                startY = e.clientY - offsetY;
                canvas.style.cursor = 'grabbing';
            }
        });
        window.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = 'grab'; });
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                offsetX = e.clientX - startX;
                offsetY = e.clientY - startY;
                redibujarEscena();
            }
        });

        // ---- Soporte táctil: arrastrar con 1 dedo, pinch-zoom con 2 dedos ----
        function distanciaEntreToques(t0, t1) {
            return Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
        }
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const r = canvas.getBoundingClientRect();
            if (e.touches.length === 1) {
                touchMode = 'pan';
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                touchMode = 'pinch';
                lastPinchDist = distanciaEntreToques(e.touches[0], e.touches[1]);
                lastPinchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
                lastPinchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
            }
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const r = canvas.getBoundingClientRect();
            if (touchMode === 'pan' && e.touches.length === 1) {
                const dx = e.touches[0].clientX - lastTouchX;
                const dy = e.touches[0].clientY - lastTouchY;
                offsetX += dx;
                offsetY += dy;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
                redibujarEscena();
            } else if (touchMode === 'pinch' && e.touches.length === 2) {
                const dist = distanciaEntreToques(e.touches[0], e.touches[1]);
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
                if (lastPinchDist > 0) {
                    const wX = (midX - offsetX) / scale, wY = (offsetY - midY) / scale;
                    const ns = Math.min(50, Math.max(0.1, scale * (dist / lastPinchDist)));
                    offsetX = midX - wX * ns;
                    offsetY = midY + wY * ns;
                    scale = ns;
                }
                lastPinchDist = dist;
                lastPinchMidX = midX;
                lastPinchMidY = midY;
                redibujarEscena();
            }
        }, { passive: false });
        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                touchMode = null;
                lastPinchDist = 0;
            } else if (e.touches.length === 1) {
                // Se soltó un dedo durante un pinch: seguir paneando con el que queda
                touchMode = 'pan';
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            }
        }, { passive: false });
        canvas.addEventListener('touchcancel', () => { touchMode = null; lastPinchDist = 0; }, { passive: false });
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top;
            const mmX = (mouseX - offsetX) / scale, mmY = (offsetY - mouseY) / scale;
            let antiguo = bloqueBajoMouse;
            bloqueBajoMouse = null;
            const pool = getPoolActual();
            for (const seg of pool) {
                if (seg.tipo === 'fantasma') continue;
                let d = distPuntoALinea(mmX, mmY, seg.x1, seg.y1, seg.x2, seg.y2);
                if (seg.tipo === 'arco' && seg.centro) {
                    d = Math.abs(Math.sqrt((mmX - seg.centro.x)**2 + (mmY - seg.centro.y)**2) - seg.r);
                }
                if (d < 5.0 / scale) {
                    bloqueBajoMouse = seg;
                    break;
                }
            }
            if (bloqueBajoMouse) {
                tooltip.style.display = 'block';
                tooltip.style.left = `${mouseX + 15}px`;
                tooltip.style.top = `${mouseY + 15}px`;
                tooltip.style.borderColor = modoRealista ? '#ff9800' : 'var(--tooltip-border)';
                let info = `<strong>Línea ${bloqueBajoMouse.numLineaReal} (G0${bloqueBajoMouse.g})</strong><br>`;
                if (bloqueBajoMouse.tipo === 'linea') {
                    info += `Longitud: ${Math.sqrt((bloqueBajoMouse.x2-bloqueBajoMouse.x1)**2 + (bloqueBajoMouse.y2-bloqueBajoMouse.y1)**2).toFixed(2)} mm<br>`;
                } else if (bloqueBajoMouse.tipo === 'arco') {
                    info += `Radio: ${bloqueBajoMouse.r.toFixed(2)} mm<br>`;
                }
                info += `Avance F: ${bloqueBajoMouse.f} mm/min<br>Interpolación: ${bloqueBajoMouse.tipo === 'linea' ? 'Lineal' : 'Circular'}`;
                tooltip.innerHTML = info;
                if (!antiguo || antiguo.numLineaReal !== bloqueBajoMouse.numLineaReal) {
                    resaltarLineaEnEditor(bloqueBajoMouse.numLineaReal, false);
                }
            } else {
                tooltip.style.display = 'none';
                if (antiguo && !simulandoActivo) limpiarResalteEditor();
            }
            if (antiguo !== bloqueBajoMouse) redibujarEscena();
        });
        canvas.addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
            if (!simulandoActivo) limpiarResalteEditor();
        });
        function distPuntoALinea(px, py, x1, y1, x2, y2) {
            const A = px - x1, B = py - y1, C = x2 - x1, D = y2 - y1;
            const dot = A*C + B*D;
            const lenSq = C*C + D*D;
            const param = lenSq !== 0 ? dot / lenSq : -1;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            return Math.sqrt((px - xx)**2 + (py - yy)**2);
        }

        // ===================================================================
        //  BOTONES FLOTANTES Y LÍMITES (sin cambios)
        // ===================================================================
        function toggleEstilo() {
            modoRealista = !modoRealista;
            document.getElementById('btnRealista').classList.toggle('active-realista', modoRealista);
            document.documentElement.setAttribute('data-realistic', modoRealista ? 'true' : 'false');
            redibujarEscena();
        }
        function toggleCotas() {
            mostrarCotas = !mostrarCotas;
            const btn = document.getElementById('btnCotas');
            btn.innerText = mostrarCotas ? 'Cotas: ON' : 'Cotas: OFF';
            btn.classList.toggle('inactive-cota', !mostrarCotas);
            redibujarEscena();
        }
        function toggleSoftLimits() {
            softLimitsActivos = !softLimitsActivos;
            btnSoftLimits.innerText = softLimitsActivos ? 'Límites: ON' : 'Límites: OFF';
            if (softLimitsActivos) actualizarLimite();
            redibujarEscena();
        }
        function actualizarLimite() {
            let val = parseFloat(limitInput.value);
            if (isNaN(val) || val < 10) val = 10;
            if (val > 500) val = 500;
            limitInput.value = val;
            softLimitX = val;
            softLimitY = val;
            if (softLimitsActivos) redibujarEscena();
        }
        btnSoftLimits.innerText = 'Límites: OFF';
        softLimitsActivos = false;

        // ===================================================================
        //  ANIMACIÓN DE TEMA (sin cambios)
        // ===================================================================
        (function crearEstrellas() {
            if (starsContainer.children.length === 0) {
                const STAR_COUNT = 80;
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < STAR_COUNT; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 3 + 1.5;
                    const x = Math.random() * 100;
                    const y = Math.random() * 100;
                    const delay = Math.random() * 3;
                    const duration = Math.random() * 2 + 1.5;
                    star.style.cssText = `
                        width: ${size}px; height: ${size}px;
                        top: ${y}%; left: ${x}%;
                        animation-delay: ${delay}s; animation-duration: ${duration}s;
                        opacity: ${Math.random() * 0.5 + 0.3};
                    `;
                    fragment.appendChild(star);
                }
                starsContainer.appendChild(fragment);
            }
        })();

        let decoTimer = null;
        function mostrarDecoracion(esNoche) {
            decoSun.classList.remove('visible', 'fading');
            decoMoon.classList.remove('visible', 'fading');
            starsContainer.classList.remove('visible');
            skyOverlay.classList.remove('visible');
            void decoSun.offsetWidth;
            if (esNoche) {
                decoMoon.classList.add('visible');
                starsContainer.classList.add('visible');
                skyOverlay.style.background = 'linear-gradient(to bottom, #0b1026, rgba(0,0,0,0))';
            } else {
                decoSun.classList.add('visible');
                skyOverlay.style.background = 'linear-gradient(to bottom, #87CEEB, rgba(255,255,255,0))';
            }
            skyOverlay.classList.add('visible');
            clearTimeout(decoTimer);
            decoTimer = setTimeout(() => {
                if (esNoche) {
                    decoMoon.classList.remove('visible');
                    decoMoon.classList.add('fading');
                    starsContainer.classList.remove('visible');
                } else {
                    decoSun.classList.remove('visible');
                    decoSun.classList.add('fading');
                }
                skyOverlay.classList.remove('visible');
                setTimeout(() => {
                    decoSun.classList.remove('fading');
                    decoMoon.classList.remove('fading');
                }, 600);
            }, 2500);
        }

        function actualizarTema(esNoche) {
            document.documentElement.setAttribute('data-theme', esNoche ? 'dark' : '');
            document.body.classList.toggle('night', esNoche);
            if (esNoche) {
                themeIcon.textContent = '🌙';
                themeTextDay.classList.add('hidden');
                themeTextNight.classList.remove('hidden');
                themeTextNight.classList.add('show');
                btnTheme.classList.add('night');
            } else {
                themeIcon.textContent = '☀️';
                themeTextDay.classList.remove('hidden');
                themeTextNight.classList.add('hidden');
                themeTextNight.classList.remove('show');
                btnTheme.classList.remove('night');
            }
            mostrarDecoracion(esNoche);
            redibujarEscena();
        }

        btnTheme.addEventListener('click', function(e) {
            e.stopPropagation();
            const esNoche = !document.body.classList.contains('night');
            actualizarTema(esNoche);
        });

        (function initTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const esNoche = isDark || !document.documentElement.hasAttribute('data-theme');
            decoSun.classList.remove('visible', 'fading');
            decoMoon.classList.remove('visible', 'fading');
            starsContainer.classList.remove('visible');
            skyOverlay.classList.remove('visible');
            document.documentElement.setAttribute('data-theme', esNoche ? 'dark' : '');
            document.body.classList.toggle('night', esNoche);
            if (esNoche) {
                themeIcon.textContent = '🌙';
                themeTextDay.classList.add('hidden');
                themeTextNight.classList.remove('hidden');
                btnTheme.classList.add('night');
                decoMoon.classList.add('visible');
                starsContainer.classList.add('visible');
            } else {
                themeIcon.textContent = '☀️';
                themeTextDay.classList.remove('hidden');
                themeTextNight.classList.add('hidden');
                btnTheme.classList.remove('night');
                decoSun.classList.add('visible');
            }
            setTimeout(() => {
                skyOverlay.style.background = esNoche ? 'linear-gradient(to bottom, #0b1026, rgba(0,0,0,0))' : 'linear-gradient(to bottom, #87CEEB, rgba(255,255,255,0))';
                skyOverlay.classList.add('visible');
                setTimeout(() => {
                    skyOverlay.classList.remove('visible');
                    if (esNoche) {
                        decoMoon.classList.remove('visible');
                        decoMoon.classList.add('fading');
                        starsContainer.classList.remove('visible');
                    } else {
                        decoSun.classList.remove('visible');
                        decoSun.classList.add('fading');
                    }
                    setTimeout(() => {
                        decoSun.classList.remove('fading');
                        decoMoon.classList.remove('fading');
                    }, 600);
                }, 2500);
            }, 300);
            redibujarEscena();
        })();

        // ===================================================================
        //  VELOCIDAD
        // ===================================================================
        function cambiarMultiplicadorVelocidad(val) {
            const p = parseInt(val);
            document.getElementById('speedVal').innerText = p + '%';
            multiplicadorVelocidad = p / 100;
            if (multiplicadorVelocidad < 0.1) multiplicadorVelocidad = 0.1;
            if (multiplicadorVelocidad > 3.0) multiplicadorVelocidad = 3.0;
        }

        // ===================================================================
        //  INICIO
        // ===================================================================
        document.addEventListener('DOMContentLoaded', () => {
            actualizarNumeracion();
            btnSoftLimits.innerText = 'Límites: OFF';
            softLimitsActivos = false;
            limitInput.value = 100;
            requestAnimationFrame(() => {
                resizeCanvas();
                inicializarYProcesar(false);
            });
        });
    </script>
</body>
